server:
  address: ":8000"

auth:
  enabled: false
  jwt_secret: "${AUTH_JWT_SECRET}"
  token_expiry_hours: 24
  rate_limit_per_minute: 20
  rate_limit_burst: 30

safety:
  prompt_guard:
    enabled: true
  output_filter:
    enabled: true

logging:
  level: "DEBUG"

tracing:
  enabled: false
  service_name: "opscaptionai-backend"
  jaeger_endpoint: ""
  sample_ratio: 1.0

events:
  health_report_enabled: true
  health_report_interval_ms: 300000

debug:
  pprof_enabled: false
  pprof_address: "127.0.0.1:6060"

cache:
  llm_response:
    enabled: true
    ttl_seconds: 300

degradation:
  kill_switch: false
  redis_key: "opscaptionai:degradation:kill_switch"
  message: "AI capabilities are temporarily degraded. Please retry later."

approval:
  enabled: true
  redis_key_prefix: "opscaptionai:approval"
  request_ttl_seconds: 86400

cost:
  daily_limit_tokens: 0
  hourly_alert_tokens: 200000
  user_daily_alert_tokens: 50000

file_dir: "./docs/"

upload:
  max_size_mb: 20

cors:
  allowed_origins:
    - "*"

harness:
  max_iterations: 10
  task_timeout_ms: 300000
  retry_budget: 3
  fail_fast: false
  validation:
    enabled: true
    contract_enforce: true
    strict_mode: false

milvus:
  address: "localhost:19530"

glm_chat_model:
  model: "GLM-4.5-AIR"
  api_key: "${GLM_API_KEY}"
  base_url: "https://open.bigmodel.cn/api/paas/v4"

glm_chat_model_fast:
  model: "GLM-4.5-AIR"
  api_key: "${GLM_API_KEY}"
  base_url: "https://open.bigmodel.cn/api/paas/v4"

llm:
  max_concurrent_calls: 10
  concurrent_wait_timeout_ms: 5000

doubao_embedding_model:
  model: "BAAI/bge-m3"
  api_key: "${SILICONFLOW_API_KEY}"
  base_url: "https://api.siliconflow.cn/v1"
  dimension: 1024

memory:
  max_window_size: 20
  max_context_tokens: 4096
  agent_mode: "llm"
  project_id: "opscaption"
  long_term_store_path: ""
  extract_timeout_ms: 1500
  extract_max_concurrency: 8
  extract_wait_timeout_ms: 50
  long_term_max_entries: 1000
  long_term_max_entries_per_session: 100

chat_async:
  enabled: false
  task_ttl_seconds: 86400
  execute_timeout_ms: 120000
  redis_key_prefix: "opscaptionai:chat_task"

context:
  chat_max_history_messages: 10
  chat_max_memory_items: 5
  aiops_max_memory_items: 5
  reporter_max_tool_items: 8
  min_memory_confidence: 0.50
  docs_query_timeout_ms: 5000
  docs_init_failure_ttl_ms: 15000

retriever:
  top_k: 5

multi_agent:
  enabled: false
  data_dir: "./var/runtime"
  ai_ops_enabled: false
  agent_timeout_ms: 30000
  metrics_query_timeout_ms: 5000
  knowledge_query_timeout_ms: 5000
  knowledge_init_failure_ttl_ms: 15000
  knowledge_evidence_limit: 5
  log_query_timeout_ms: 3000
  log_evidence_limit: 3

log_topic:
  region: ""
  id: ""

mcp:
  log_url: ""

mysql:
  dsn: ""
  allowed_tables: []
  query_timeout_ms: 10000
  max_rows: 100

prometheus:
  address: ""

rabbitmq:
  enabled: false
  url: "amqp://guest:guest@127.0.0.1:5672/"
  exchange: "opscaption.events"
  memory_extract_queue: "opscaption.memory.extract"
  memory_extract_consumer_enabled: true
  prefetch: 8
  max_retries: 3
  retry_delay_ms: 2000
  reconnect_delay_ms: 2000
  publish_timeout_ms: 2000
  chat_task_queue: "opscaption.chat.task"
  chat_task_consumer_enabled: true
  chat_task_prefetch: 4
  chat_task_max_retries: 3
  chat_task_retry_delay_ms: 2000
  memory_extract_dedup_ttl_ms: 600000
  memory_extract_dedup_max_entries: 20000

redis:
  default:
    address: "127.0.0.1:6379"
    db: 0
