global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/opscaptionai-cost-alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: opscaption-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000
