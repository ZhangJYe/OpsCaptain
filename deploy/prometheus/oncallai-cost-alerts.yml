groups:
  - name: oncallai-cost
    rules:
      - alert: OnCallAIHourlyTokenSpike
        expr: sum(increase(oncallai_llm_tokens_total[1h])) > 200000
        for: 5m
        labels:
          severity: warning
          service: oncallai
        annotations:
          summary: "OnCallAI hourly token consumption exceeded threshold"
          description: "Hourly token consumption is {{ $value }}. Check hot sessions and agent mix."

      - alert: OnCallAISessionDailyTokenSpike
        expr: sum by (session_id, user_id) (increase(oncallai_session_tokens_total[24h])) > 50000
        for: 10m
        labels:
          severity: warning
          service: oncallai
        annotations:
          summary: "OnCallAI daily token consumption exceeded session threshold"
          description: "Session {{ $labels.session_id }} for user {{ $labels.user_id }} consumed {{ $value }} tokens in the last 24h."
