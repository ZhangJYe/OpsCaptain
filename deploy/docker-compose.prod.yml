services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    restart: unless-stopped
    environment:
      QUERY_BASE_PATH: ${JAEGER_BASE_PATH:-/jaeger}
    expose:
      - "14268"
    ports:
      - "127.0.0.1:16686:16686"

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/opscaptionai-cost-alerts.yml:/etc/prometheus/rules/opscaptionai-cost-alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    restart: unless-stopped
    stop_grace_period: 35s
    depends_on:
      jaeger:
        condition: service_started
    env_file:
      - .env.production
    environment:
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT:-http://jaeger:14268/api/traces}
      PROMETHEUS_ADDRESS: ${PROMETHEUS_ADDRESS:-http://prometheus:9090}
    volumes:
      - docs-data:/app/docs
      - runtime-data:/app/var/runtime
      - ./config.prod.yaml:/app/manifest/config/config.yaml:ro
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8000/readyz"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.generated:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  docs-data:
  runtime-data:
  prometheus-data:
  caddy-data:
  caddy-config:
