services:
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - docs-data:/app/docs
      - runtime-data:/app/var/runtime
      - ./config.prod.yaml:/app/manifest/config/config.yaml:ro
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.generated:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  docs-data:
  runtime-data:
  caddy-data:
  caddy-config:
