services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    restart: unless-stopped
    environment:
      QUERY_BASE_PATH: ${JAEGER_BASE_PATH:-/jaeger}
    expose:
      - "14268"
    ports:
      - "127.0.0.1:16686:16686"

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    mem_limit: ${PROMETHEUS_MEM_LIMIT:-4g}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.wal-compression
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-3d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-6GB}
      - --web.external-url=${PROMETHEUS_EXTERNAL_URL:-/prometheus/}
      - --web.route-prefix=/
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/opscaptionai-cost-alerts.yml:/etc/prometheus/rules/opscaptionai-cost-alerts.yml:ro
      - ./prometheus/freeexchanged-alerts.yml:/etc/prometheus/rules/freeexchanged-alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      backend:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    restart: unless-stopped
    stop_grace_period: 35s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      jaeger:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT:-http://jaeger:14268/api/traces}
      PROMETHEUS_ADDRESS: ${PROMETHEUS_ADDRESS:-http://prometheus:9090}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://${RABBITMQ_USERNAME:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/}
      REDIS_ADDRESS: ${REDIS_ADDRESS:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - docs-data:/app/docs
      - runtime-data:/app/var/runtime
      - ./config.prod.yaml:/app/manifest/config/config.yaml:ro
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8000/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.generated:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  docs-data:
  runtime-data:
  prometheus-data:
  rabbitmq-data:
  redis-data:
  caddy-data:
  caddy-config:
