server:
  address: ":8000"

auth:
  enabled: "${AUTH_ENABLED}"
  jwt_secret: "${AUTH_JWT_SECRET}"
  token_expiry_hours: "${AUTH_TOKEN_EXPIRY_HOURS}"
  rate_limit_per_minute: "${AUTH_RATE_LIMIT_PER_MINUTE}"
  rate_limit_burst: "${AUTH_RATE_LIMIT_BURST}"

file_dir: "${FILE_DIR}"

upload:
  max_size_mb: "${UPLOAD_MAX_SIZE_MB}"

cors:
  allowed_origins:
    - "${CORS_ALLOWED_ORIGIN}"

milvus:
  address: "${MILVUS_ADDRESS}"

ds_think_chat_model:
  model: "${DS_THINK_MODEL}"
  api_key: "${GLM_API_KEY}"
  base_url: "${DS_THINK_BASE_URL}"

ds_quick_chat_model:
  model: "${DS_QUICK_MODEL}"
  api_key: "${GLM_API_KEY}"
  base_url: "${DS_QUICK_BASE_URL}"

doubao_embedding_model:
  model: "${EMBEDDING_MODEL}"
  api_key: "${SILICONFLOW_API_KEY}"
  base_url: "${EMBEDDING_BASE_URL}"
  dimension: "${EMBEDDING_DIMENSION}"

memory:
  max_window_size: 20
  max_context_tokens: 4096
  extract_timeout_ms: 1500
  long_term_max_entries: 1000
  long_term_max_entries_per_session: 100

context:
  chat_max_history_messages: 10
  chat_max_memory_items: 5
  aiops_max_memory_items: 5
  reporter_max_tool_items: 8
  docs_query_timeout_ms: 5000
  docs_init_failure_ttl_ms: 15000

retriever:
  top_k: 5

multi_agent:
  data_dir: "${RUNTIME_DATA_DIR}"
  chat_route_enabled: true
  metrics_query_timeout_ms: 5000
  knowledge_query_timeout_ms: 5000
  knowledge_init_failure_ttl_ms: 15000
  knowledge_evidence_limit: 5
  log_query_timeout_ms: 3000
  log_evidence_limit: 3

log_topic:
  region: "${LOG_TOPIC_REGION}"
  id: "${LOG_TOPIC_ID}"

mcp:
  log_url: "${MCP_LOG_URL}"

mysql:
  dsn: "${MYSQL_DSN}"

prometheus:
  address: "${PROMETHEUS_ADDRESS}"

