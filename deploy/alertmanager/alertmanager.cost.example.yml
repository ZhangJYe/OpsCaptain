route:
  receiver: opscaptionai-webhook
  group_by:
    - alertname
    - service
    - session_id
    - user_id
  group_wait: 30s
  group_interval: 2m
  repeat_interval: 1h

receivers:
  - name: opscaptionai-webhook
    webhook_configs:
      - url: https://hooks.example.com/opscaptionai-cost-alerts
        send_resolved: true
