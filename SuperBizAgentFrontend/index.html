<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsCaptain 智能助手</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="input.css">
    <link rel="stylesheet" href="components.css">
    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <!-- 代码高亮库（可选） -->
    <link rel="stylesheet" id="hljsTheme" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/highlight.min.js"></script>
    <!-- XSS 防护库 -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
</head>
<body>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="brand-mark">O</div>
                    <div class="brand-copy">
                        <h2 class="sidebar-title">OpsCaptain</h2>
                        <p class="sidebar-subtitle">排障与知识库助手</p>
                    </div>
                </div>
                <button class="sidebar-close-btn" id="sidebarCloseBtn" title="关闭侧栏">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>

            <div class="sidebar-content">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>开启新对话</span>
                </button>

                <div class="history-search">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 21L16.65 16.65M18 10.5C18 14.6421 14.6421 18 10.5 18C6.35786 18 3 14.6421 3 10.5C3 6.35786 6.35786 3 10.5 3C14.6421 3 18 6.35786 18 10.5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <input id="historySearchInput" type="text" placeholder="搜索历史会话">
                </div>

                <div class="chat-history-section">
                    <div class="history-header">
                        <span>最近会话</span>
                    </div>
                    <div class="chat-history-list" id="chatHistoryList">
                    </div>
                </div>

                <div class="sidebar-footer">
                    <div class="sidebar-footer-label">当前能力</div>
                    <div class="sidebar-footer-meta">对话 / 流式 / AI Ops / 文件入库</div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle-btn" id="sidebarToggleBtn" title="打开侧栏">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 7H20M4 12H20M4 17H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <div class="topbar-copy">
                        <h1 class="topbar-title">OpsCaptain</h1>
                        <p class="topbar-subtitle">对话、流式分析、AI Ops 和知识库上传</p>
                    </div>
                </div>
                <div class="topbar-actions">
                    <button class="theme-toggle-btn" id="themeToggleBtn" title="切换主题">
                        <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
                            <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
                            <path d="M12 1V3M12 21V23M4.22 4.22L5.64 5.64M18.36 18.36L19.78 19.78M1 12H3M21 12H23M4.22 19.78L5.64 18.36M18.36 5.64L19.78 4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <div class="mode-chip">
                        <span id="currentModeText">快速</span>
                    </div>
                    <button class="ai-ops-top-btn" id="aiOpsSidebarBtn">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>AI Ops</span>
                    </button>
                </div>
            </header>

            <div class="chat-container">
                <div class="welcome-greeting" id="welcomeGreeting">
                    <div class="hero-badge">OpsCaptain</div>
                    <h2>准备好了，随时开始</h2>
                    <p>提问、排查告警、上传文档，或直接运行 AI Ops。</p>
                    <div class="prompt-grid">
                        <button class="prompt-card" data-prompt="请总结当前系统的核心能力，并告诉我适合从哪里开始使用。">
                            <span class="prompt-card-title">快速上手</span>
                            <span class="prompt-card-text">先了解这个助手现在能做什么</span>
                        </button>
                        <button class="prompt-card" data-prompt="请基于现有知识库，给我一份常见告警的处理思路清单。">
                            <span class="prompt-card-title">告警排查</span>
                            <span class="prompt-card-text">整理可复用的处理路径</span>
                        </button>
                        <button class="prompt-card" data-prompt="我准备上传一份内部运维文档，你建议知识库文档如何组织？">
                            <span class="prompt-card-title">知识库建设</span>
                            <span class="prompt-card-text">把手册、流程和 FAQ 接入对话</span>
                        </button>
                        <button class="prompt-card" data-prompt="请模拟一次值班交接，列出今天最值得关注的风险点。">
                            <span class="prompt-card-title">值班交接</span>
                            <span class="prompt-card-text">生成面向值班同学的重点摘要</span>
                        </button>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages">
                </div>

                <div class="chat-input-container">
                    <div class="input-group-wrapper">
                        <div class="input-wrapper">
                            <textarea id="messageInput" placeholder="有问题，尽管问" maxlength="1000" class="message-input" rows="1"></textarea>
                            <div class="input-bottom-bar">
                                <div class="tools-btn-wrapper">
                                    <button class="tools-btn" id="toolsBtn" title="更多选项">
                                        <svg class="tools-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                        </svg>
                                    </button>
                                    <div class="tools-menu" id="toolsMenu">
                                        <div class="tools-menu-item" id="uploadFileItem">
                                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                            </svg>
                                            <span>上传到知识库</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="right-actions">
                                    <div class="mode-selector-wrapper">
                                        <button class="mode-selector-btn" id="modeSelectorBtn">
                                            <span id="modeSelectorCurrent">快速回答</span>
                                            <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                            </svg>
                                        </button>
                                        <div class="mode-dropdown" id="modeDropdown">
                                            <div class="dropdown-header">选择对话方式</div>
                                            <div class="dropdown-item active" data-mode="quick">
                                                <div class="dropdown-item-main">
                                                    <span>快速</span>
                                                    <span class="badge-new">默认</span>
                                                </div>
                                                <div class="dropdown-item-sub">一次性返回完整答案</div>
                                            </div>
                                            <div class="dropdown-item" data-mode="stream">
                                                <div class="dropdown-item-main">
                                                    <span>流式</span>
                                                </div>
                                                <div class="dropdown-item-sub">边生成边展示，适合长回答</div>
                                            </div>
                                        </div>
                                    </div>
                                    <button class="send-btn-circle" id="sendButton" title="发送">
                                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="composer-footnote">Enter 发送，Shift + Enter 换行</div>
                    <input type="file" id="fileInput" accept=".md,.txt,.pdf,.doc,.docx,.csv,.json,.yaml,.yml" style="display: none;">
                </div>
            </div>
        </main>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">智能运维分析中，请稍候...</div>
            <div class="loading-subtext">后端正在处理，请耐心等待</div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
