name: cd

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  REGISTRY: ${{ secrets.ACR_REGISTRY }}
  NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
  BACKEND_IMAGE: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/opscaptain-backend
  FRONTEND_IMAGE: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/opscaptain-frontend
  ECS_HOST: ${{ secrets.ECS_HOST }}
  ECS_USER: ${{ secrets.ECS_USER }}
  ECS_SSH_PORT: ${{ secrets.ECS_SSH_PORT }}
  ECS_SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
  ECS_SSH_PRIVATE_KEY_BASE64: ${{ secrets.ECS_SSH_PRIVATE_KEY_BASE64 }}
  REMOTE_APP_DIR: ${{ secrets.ECS_APP_DIR }}
  PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize deployment inputs
        run: |
          {
            printf 'REGISTRY=%s\n' "$(printf '%s' "${REGISTRY}" | tr -d '\r\n')"
            printf 'NAMESPACE=%s\n' "$(printf '%s' "${NAMESPACE}" | tr -d '\r\n')"
            printf 'ACR_USERNAME=%s\n' "$(printf '%s' "${ACR_USERNAME}" | tr -d '\r\n')"
            printf 'ACR_PASSWORD=%s\n' "$(printf '%s' "${ACR_PASSWORD}" | tr -d '\r\n')"
            printf 'ECS_HOST=%s\n' "$(printf '%s' "${ECS_HOST}" | tr -d '\r\n')"
            printf 'ECS_USER=%s\n' "$(printf '%s' "${ECS_USER}" | tr -d '\r\n')"
            printf 'ECS_SSH_PORT=%s\n' "$(printf '%s' "${ECS_SSH_PORT}" | tr -d '\r\n')"
            printf 'ECS_SSH_PRIVATE_KEY_BASE64=%s\n' "$(printf '%s' "${ECS_SSH_PRIVATE_KEY_BASE64}" | tr -d '\r\n')"
            printf 'REMOTE_APP_DIR=%s\n' "$(printf '%s' "${REMOTE_APP_DIR}" | tr -d '\r\n')"
          } >> "$GITHUB_ENV"

      - name: Validate deployment secrets
        run: |
          missing=0
          for name in REGISTRY NAMESPACE ACR_USERNAME ACR_PASSWORD ECS_HOST ECS_USER ECS_SSH_PORT REMOTE_APP_DIR PROD_ENV_FILE; do
            if [ -z "$(printenv "$name")" ]; then
              echo "::error::$name is empty. Check the matching GitHub Actions secret."
              missing=1
            fi
          done
          if [ -z "${ECS_SSH_PRIVATE_KEY_BASE64}" ] && [ -z "${ECS_SSH_PRIVATE_KEY}" ]; then
            echo "::error::Either ECS_SSH_PRIVATE_KEY_BASE64 or ECS_SSH_PRIVATE_KEY must be set."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Log in to Alibaba Cloud Container Registry
        run: echo "${ACR_PASSWORD}" | docker login "${REGISTRY}" -u "${ACR_USERNAME}" --password-stdin

      - name: Build and push backend image
        run: |
          docker build \
            -t "${BACKEND_IMAGE}:${GITHUB_SHA}" \
            -t "${BACKEND_IMAGE}:latest" \
            .
          docker push "${BACKEND_IMAGE}:${GITHUB_SHA}"
          docker push "${BACKEND_IMAGE}:latest"

      - name: Build and push frontend image
        run: |
          docker build \
            -f SuperBizAgentFrontend/Dockerfile \
            -t "${FRONTEND_IMAGE}:${GITHUB_SHA}" \
            -t "${FRONTEND_IMAGE}:latest" \
            SuperBizAgentFrontend
          docker push "${FRONTEND_IMAGE}:${GITHUB_SHA}"
          docker push "${FRONTEND_IMAGE}:latest"

      - name: Prepare SSH client
        run: |
          mkdir -p ~/.ssh
          if [ -n "${ECS_SSH_PRIVATE_KEY_BASE64}" ]; then
            printf '%s' "${ECS_SSH_PRIVATE_KEY_BASE64}" | base64 -d > ~/.ssh/id_rsa
          else
            printf '%s' "${ECS_SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
          fi
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null
          ssh-keyscan -p "${ECS_SSH_PORT}" "${ECS_HOST}" >> ~/.ssh/known_hosts

      - name: Prepare deployment bundle
        run: |
          mkdir -p dist-deploy
          cp deploy/docker-compose.prod.yml dist-deploy/docker-compose.prod.yml
          cp deploy/config.prod.yaml dist-deploy/config.prod.yaml
          cp deploy/remote-deploy.sh dist-deploy/remote-deploy.sh
          printf '%s' "${PROD_ENV_FILE}" | tr -d '\r' > dist-deploy/.env.production
          printf '%s' "${ACR_PASSWORD}" > dist-deploy/.acr-password
          cat <<EOF > dist-deploy/release.env
          BACKEND_IMAGE=${BACKEND_IMAGE}:${GITHUB_SHA}
          FRONTEND_IMAGE=${FRONTEND_IMAGE}:${GITHUB_SHA}
          ACR_REGISTRY=${REGISTRY}
          ACR_USERNAME=${ACR_USERNAME}
          ACR_PASSWORD_FILE=.acr-password
          EOF

      - name: Create remote directory
        run: ssh -p "${ECS_SSH_PORT}" "${ECS_USER}@${ECS_HOST}" "mkdir -p '${REMOTE_APP_DIR}'"

      - name: Upload deployment files
        run: |
          scp -P "${ECS_SSH_PORT}" dist-deploy/docker-compose.prod.yml "${ECS_USER}@${ECS_HOST}:${REMOTE_APP_DIR}/docker-compose.prod.yml"
          scp -P "${ECS_SSH_PORT}" dist-deploy/config.prod.yaml "${ECS_USER}@${ECS_HOST}:${REMOTE_APP_DIR}/config.prod.yaml"
          scp -P "${ECS_SSH_PORT}" dist-deploy/remote-deploy.sh "${ECS_USER}@${ECS_HOST}:${REMOTE_APP_DIR}/remote-deploy.sh"
          scp -P "${ECS_SSH_PORT}" dist-deploy/.env.production "${ECS_USER}@${ECS_HOST}:${REMOTE_APP_DIR}/.env.production"
          scp -P "${ECS_SSH_PORT}" dist-deploy/.acr-password "${ECS_USER}@${ECS_HOST}:${REMOTE_APP_DIR}/.acr-password"
          scp -P "${ECS_SSH_PORT}" dist-deploy/release.env "${ECS_USER}@${ECS_HOST}:${REMOTE_APP_DIR}/release.env"

      - name: Deploy on ECS
        run: |
          ssh -p "${ECS_SSH_PORT}" "${ECS_USER}@${ECS_HOST}" "\
            cd '${REMOTE_APP_DIR}' && \
            chmod +x ./remote-deploy.sh && \
            APP_DIR='${REMOTE_APP_DIR}' ./remote-deploy.sh"
